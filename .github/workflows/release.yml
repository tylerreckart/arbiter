name: Build and publish release

# Build arbiter on tag push and publish a GitHub Release on this same
# repository with prebuilt binaries for each platform.  Tag-driven —
# pushing a `vX.Y.Z` tag is the only thing that fires this.
#
# Setup prereqs (one-time):
#   - Bump `project(arbiter VERSION X.Y.Z ...)` in CMakeLists.txt to match
#     the tag you're about to push (the binary embeds it via INDEX_VERSION).
#   - `git tag vX.Y.Z && git push origin vX.Y.Z` runs this workflow.
#     Or: Actions → Build and publish release → Run workflow → pick a tag.
#
# Asset naming (kept version-free so `releases/latest/download/...` works
# as a stable URL in install scripts):
#   arbiter-macos-arm64.tar.gz    (+ .sha256 sibling)
#   arbiter-linux-x86_64.tar.gz   (+ .sha256)
# Each tarball is flat: `arbiter` binary + `libopentui.*` + LICENSE +
# README.md at the root.  OpenTUI is loaded via a same-directory RPATH
# (@loader_path / $ORIGIN).
#
# macOS release binaries intentionally:
#   - link the system libcurl (never Homebrew curl — that embeds
#     /opt/homebrew/opt/curl/... and breaks machines without the formula)
#   - statically link Homebrew openssl@3 so libssl/libcrypto dylibs are
#     not required at runtime
#
# x86_64 macOS is intentionally NOT shipped as a separate slice.  GitHub
# retired the `macos-13` Intel runner in Dec 2025; the remaining options
# (universal-binary build with a from-source fat OpenSSL, or per-arch
# cross-compile with a second Homebrew install) cost real CI minutes
# and maintenance for a vanishing user base.  Intel Mac users run the
# arm64 binary via Rosetta 2 — no perf concern for a CLI tool.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.3.6)"
        required: true

# Default perms are read-only; the publish job grants itself `contents:
# write` to upload assets to the GitHub Release of this repo.
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os_slug }}-${{ matrix.arch_slug }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on:   macos-14         # Apple Silicon — only macOS slice we ship
            os_slug:   macos
            arch_slug: arm64
          - runs_on:   ubuntu-22.04     # glibc 2.35 — broad Linux compat
            os_slug:   linux
            arch_slug: x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # cmake is preinstalled on GitHub's macOS images; reinstalling via
      # `brew install cmake` triggers symlink conflicts ("cmake is keg-only
      # but is already linked").  Stick to libs that aren't pre-installed.
      # No `|| true` — a brew failure here means the release build is
      # broken; better to surface it loudly than mask it.
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          brew update --quiet
          brew install --formula openssl@3

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libcurl4-openssl-dev libsqlite3-dev

      - name: Configure
        run: |
          set -euxo pipefail
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            OPENSSL_PREFIX="$(brew --prefix openssl@3)"
            SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
            # System libcurl only — never Homebrew curl (portable install).
            # Static OpenSSL so users do not need brew's libssl/libcrypto.
            EXTRA="-DOPENSSL_ROOT_DIR=${OPENSSL_PREFIX}"
            EXTRA="${EXTRA} -DOPENSSL_USE_STATIC_LIBS=TRUE"
            EXTRA="${EXTRA} -DCURL_INCLUDE_DIR=${SDKROOT}/usr/include"
            EXTRA="${EXTRA} -DCURL_LIBRARY=/usr/lib/libcurl.4.dylib"
            # Keep pkg-config from preferring a Homebrew curl .pc if present.
            export PKG_CONFIG_PATH="${OPENSSL_PREFIX}/lib/pkgconfig"
            unset CURL_ROOT || true
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DINDEX_BUILD_TESTS=OFF \
            $EXTRA

      # Bound parallelism to the core count — bare `-j` means unlimited jobs
      # for make, which thrashes the 3-core/7 GB macos-14 runner into swap.
      # (See ci.yml for the full story.)
      - name: Build
        run: cmake --build build --config Release -j "$(getconf _NPROCESSORS_ONLN)"

      - name: Strip symbols
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip -S build/arbiter
          else
            strip --strip-unneeded build/arbiter
          fi

      - name: Stage + tarball
        id: pkg
        run: |
          set -euxo pipefail
          NAME="arbiter-${{ matrix.os_slug }}-${{ matrix.arch_slug }}"
          STAGE="stage-${NAME}"
          mkdir -p "$STAGE"
          install -m 755 build/arbiter "$STAGE/arbiter"
          # OpenTUI shared lib must sit next to the binary (@loader_path/$ORIGIN).
          if [ "${{ runner.os }}" = "macOS" ]; then
            OPENTUI_LIB="libopentui.dylib"
          else
            OPENTUI_LIB="libopentui.so"
          fi
          if [ ! -f "build/${OPENTUI_LIB}" ]; then
            echo "missing staged OpenTUI library: build/${OPENTUI_LIB}" >&2
            ls -la build/ build/opentui/ >&2 || true
            exit 1
          fi
          install -m 755 "build/${OPENTUI_LIB}" "$STAGE/${OPENTUI_LIB}"
          [ -f LICENSE ]   && cp LICENSE   "$STAGE/"
          [ -f README.md ] && cp README.md "$STAGE/"
          tar -C "$STAGE" -czf "${NAME}.tar.gz" .
          # SHA-256 sibling file — prefix is the hash, then two spaces and
          # the filename so `shasum -c` / `sha256sum -c` verifies it.
          if command -v sha256sum >/dev/null; then
            sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "opentui_lib=${OPENTUI_LIB}" >> "$GITHUB_OUTPUT"

      - name: Smoke test (portable extract + deps)
        run: |
          set -euxo pipefail
          NAME="${{ steps.pkg.outputs.name }}"
          OPENTUI_LIB="${{ steps.pkg.outputs.opentui_lib }}"

          # Extract outside the build tree so a baked-in CI absolute RPATH
          # cannot accidentally satisfy libopentui and greenwash the test.
          SMOKE="$(mktemp -d "${RUNNER_TEMP}/arbiter-smoke.XXXXXX")"
          tar -xzf "${NAME}.tar.gz" -C "$SMOKE"
          test -x "$SMOKE/arbiter"
          test -f "$SMOKE/${OPENTUI_LIB}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "otool -L:"
            otool -L "$SMOKE/arbiter"
            # Fail on Homebrew or runner-absolute dylib paths — those only
            # resolve on the build machine.
            if otool -L "$SMOKE/arbiter" | grep -E '/opt/homebrew|/usr/local/opt|/Users/runner'; then
              echo "portable check failed: non-portable dylib load path" >&2
              exit 1
            fi
            # OpenTUI must resolve via @rpath/@loader_path, not an abs path.
            otool -L "$SMOKE/arbiter" | grep -E '@(loader_path|rpath)/libopentui\.dylib'
          else
            echo "readelf deps:"
            readelf -d "$SMOKE/arbiter" | tee /tmp/arbiter-readelf.txt
            if grep -E 'RPATH|RUNPATH' /tmp/arbiter-readelf.txt | grep -E '/home/runner|/opt/'; then
              echo "portable check failed: non-portable RUNPATH/RPATH" >&2
              exit 1
            fi
            # Same-directory resolution via $ORIGIN — no LD_LIBRARY_PATH.
            # ldd prints the absolute resolved path, which will be under
            # $SMOKE (and therefore often under /home/runner/work/_temp on
            # GHA). That is expected; only reject "not found" or a resolve
            # into the checkout build tree.
            ldd "$SMOKE/arbiter" | tee /tmp/arbiter-ldd.txt
            if grep -E 'libopentui\.so => not found' /tmp/arbiter-ldd.txt; then
              echo "portable check failed: libopentui.so not resolved from \$ORIGIN" >&2
              exit 1
            fi
            if ! grep -F "libopentui.so => ${SMOKE}/${OPENTUI_LIB}" /tmp/arbiter-ldd.txt; then
              echo "portable check failed: libopentui.so did not resolve next to arbiter" >&2
              exit 1
            fi
            if grep -E 'libopentui\.so => .*/build/' /tmp/arbiter-ldd.txt; then
              echo "portable check failed: libopentui resolved via build-tree path" >&2
              exit 1
            fi
          fi

          "$SMOKE/arbiter" --help >/dev/null
          echo "smoke: --help exit 0 (portable extract)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: |
            ${{ steps.pkg.outputs.name }}.tar.gz
            ${{ steps.pkg.outputs.name }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List staged assets
        run: ls -la artifacts/

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          REPO="${{ github.repository }}"

          # Create the release if it doesn't already exist.  --clobber on
          # upload makes re-running the workflow for the same tag idempotent
          # (assets replaced rather than duplicated).
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "arbiter $TAG" \
              --generate-notes
          fi

          gh release upload "$TAG" \
            --repo "$REPO" \
            --clobber \
            artifacts/arbiter-*.tar.gz \
            artifacts/arbiter-*.tar.gz.sha256
