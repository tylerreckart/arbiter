name: CI

# Build + test on every PR and every push to main.  Mirrors the release
# matrix so anything that breaks in release.yml is caught here first.
# Also runs Linux-only AddressSanitizer and ThreadSanitizer legs that
# flip the existing ARBITER_ASAN / ARBITER_TSAN CMake options.
# After the Debug suite, `build_and_test` runs the shared portable
# package/smoke script (Release reconfigure on macOS only) so curl.tbd /
# OpenTUI RPATH regressions fail here without extra parallel jobs.
# Pull-request runs use the standard GITHUB_TOKEN with read-only perms;
# no secrets needed.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel an in-flight CI run when a new commit lands on the same ref —
# saves runner minutes on rapid pushes / force-pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: ${{ matrix.os_slug }}-${{ matrix.arch_slug }}
    runs-on: ${{ matrix.runs_on }}
    # Hard upper bound: a hung PTY test should fail fast, not eat hours
    # of the workflow's 6-hour default budget.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS coverage is arm64-only.  GitHub retired `macos-13`
          # (Intel) in Dec 2025; producing an x86_64 binary on the
          # arm64 `macos-14` runner would require either a
          # universal-binary build (Homebrew openssl@3 ships single-
          # arch arm64, so the link fails for x86_64) or a separate
          # x86_64 Homebrew bootstrap (~5 min/job of CI overhead for
          # a vanishing user base).  Apple stopped shipping Intel
          # Macs in 2023; remaining users run the arm64 binary via
          # Rosetta 2 transparently.
          - runs_on:    macos-14
            os_slug:    macos
            arch_slug:  arm64
          - runs_on:    ubuntu-22.04   # glibc 2.35 — broad Linux compat
            os_slug:    linux
            arch_slug:  x86_64

    steps:
      - uses: actions/checkout@v4

      # cmake is preinstalled on GitHub's macOS images; reinstalling via
      # `brew install cmake` triggers symlink conflicts ("cmake is keg-only
      # but is already linked").  Stick to libs that aren't pre-installed.
      # No `|| true` — a brew failure here means the build will fail
      # later in CMake configure with a less obvious error message; better
      # to surface the real cause now.
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          brew update --quiet
          brew install --formula openssl@3

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libcurl4-openssl-dev libsqlite3-dev

      - name: Configure
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA="-DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DINDEX_BUILD_TESTS=ON \
            $EXTRA

      # Bound parallelism to the core count.  Bare `-j` tells make to spawn
      # unlimited jobs; the many per-test executables make hundreds of object
      # files ready at once, and on the 3-core/7 GB macos-14 runner that
      # launches ~150 clang processes simultaneously and the build stalls in
      # swap for ~20 minutes (vs ~2.5 min on Linux).
      - name: Build
        run: cmake --build build --config Debug -j "$(getconf _NPROCESSORS_ONLN)"

      # `--no-tests=error` makes ctest fail loudly if no tests are
      # registered (a regression that would otherwise silently pass).
      # Tests run sequentially (`-j 1`) so the PTY-driven line_editor
      # suite doesn't fight other tests for runner CPU on slow images.
      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error -j 1

      # On a test failure, surface CTest's full per-test logs as an
      # artifact so the doctest assertion + line number is recoverable
      # without rerunning CI.  `LastTest.log` and `LastTestsFailed.log`
      # land under build/Testing/Temporary/ regardless of pass/fail; we
      # only upload when the prior step failed so green runs don't
      # accumulate noise.
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.os_slug }}-${{ matrix.arch_slug }}
          path: build/Testing/Temporary/
          if-no-files-found: ignore
          retention-days: 7

      # Portable packaging checks share `.github/scripts/portable_release.sh`
      # with release.yml.  Folded into this job (no extra matrix legs) so PR
      # check UI stays at the existing OS + sanitizer set.
      #
      # macOS: Debug links Homebrew OpenSSL, so reconfigure Release with the
      # real publish flags (SDK curl.tbd + static OpenSSL) before packaging.
      # Linux: system libssl/libcurl match the published binary; reuse `build`.
      - name: Portable release configure (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          chmod +x .github/scripts/portable_release.sh
          .github/scripts/portable_release.sh configure build-release

      - name: Portable release build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build-release --config Release -j "$(getconf _NPROCESSORS_ONLN)"

      - name: Portable package + smoke
        run: |
          set -euxo pipefail
          chmod +x .github/scripts/portable_release.sh
          if [ "${{ runner.os }}" = "macOS" ]; then
            PKG_BUILD=build-release
            strip -S "${PKG_BUILD}/arbiter"
          else
            PKG_BUILD=build
          fi
          .github/scripts/portable_release.sh package "${PKG_BUILD}" \
            "${{ matrix.os_slug }}" "${{ matrix.arch_slug }}"
          # package writes name= / opentui_lib= to GITHUB_OUTPUT when set.
          NAME="arbiter-${{ matrix.os_slug }}-${{ matrix.arch_slug }}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            OPENTUI_LIB=libopentui.dylib
          else
            OPENTUI_LIB=libopentui.so
          fi
          .github/scripts/portable_release.sh smoke "${NAME}" "${OPENTUI_LIB}"

  # Sanitizer coverage is Linux-only.  macOS ASan cannot detect leaks
  # ("detect_leaks is not supported on this platform"), and ASan/TSan
  # cannot be combined in one configure (CMake FATAL_ERROR).  Separate
  # matrix legs keep the plain Debug OS matrix lean while continuously
  # exercising the existing ARBITER_ASAN / ARBITER_TSAN CMake options.
  sanitizers:
    name: linux-x86_64-${{ matrix.sanitizer }}
    runs-on: ubuntu-22.04
    # TSan (and ASan+leaks) inflate build and especially ctest wall time;
    # give these legs more headroom than the plain Debug OS matrix.
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: asan
            cmake_flag: -DARBITER_ASAN=ON
            cache_expect: ARBITER_ASAN:BOOL=ON
            timeout_minutes: 35
            # Full suite including PTY (ASan is compatible enough with the
            # prebuilt OpenTUI .so for these deadlines).
            ctest_args: ""
          - sanitizer: tsan
            cmake_flag: -DARBITER_TSAN=ON
            cache_expect: ARBITER_TSAN:BOOL=ON
            timeout_minutes: 60
            # Exclude PTY integration tests: they link prebuilt unsanitized
            # OpenTUI and are deadline-flaky under TSan.  Unit/concurrency
            # tests (the point of TSan for this issue) still run.
            ctest_args: "--label-exclude pty"

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libcurl4-openssl-dev libsqlite3-dev

      - name: Configure
        run: |
          set -euxo pipefail
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DINDEX_BUILD_TESTS=ON \
            ${{ matrix.cmake_flag }}
          # Guard against a mistyped -D quietly leaving the sanitizer OFF
          # (CMake treats unknown cache vars as unused, not as errors).
          grep -F '${{ matrix.cache_expect }}' build/CMakeCache.txt

      - name: Build
        run: cmake --build build --config Debug -j "$(getconf _NPROCESSORS_ONLN)"

      # Fail the step on the first sanitizer finding.  ASan leak detection
      # works on Linux (unlike macOS) — the reason these legs stay
      # Linux-only.  Unused *_OPTIONS vars are ignored by the other
      # sanitizer runtime, so both can be set on every leg.  PtySession
      # forwards these into PTY-spawned arbiter children.
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          TSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build --output-on-failure --no-tests=error -j 1 ${{ matrix.ctest_args }}

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-linux-x86_64-${{ matrix.sanitizer }}
          path: build/Testing/Temporary/
          if-no-files-found: ignore
          retention-days: 7
